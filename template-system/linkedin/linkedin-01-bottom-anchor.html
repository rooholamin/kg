<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:600px;height:314px;overflow:hidden;">
  <img src="{{HERO_IMAGE}}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;" alt="">
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,5,0.96) 0%,rgba(10,8,5,0.55) 50%,rgba(10,8,5,0.12) 100%);z-index:1;"></div>
  <img src="../assets/K.png" style="position:absolute;right:-30px;bottom:-20px;width:280px;height:auto;opacity:0.09;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <div style="display:flex;align-items:center;gap:8px;">
      <img src="../assets/logo.svg" style="height:22px;filter:brightness(0) invert(1);" alt="KG">
      <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:7px;letter-spacing:2.5px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
    </div>
    <span style="font-family:'Dosis',sans-serif;font-size:7px;color:rgba(255,255,255,0.3);letter-spacing:1px;">insights.kghub.ca</span>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:0 22px 20px;z-index:10;">
  <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:7px;letter-spacing:2.5px;color:{{COLOR_ACCENT}};text-transform:uppercase;display:inline-block;margin-bottom:8px;">{{TONE}}</span>
    <h2 style="font-family:'TCM',sans-serif;font-weight:700;font-size:22px;color:#fff;line-height:1.2;margin:0 0 12px;max-width:400px;">{{ART_TITLE}}</h2>
  <div style="display:flex;align-items:center;gap:7px;">
    <div style="width:24px;height:24px;border-radius:50%;overflow:hidden;border:1.5px solid {{COLOR_ACCENT}};flex-shrink:0;">
      <img src="{{WRITER_PHOTO}}" style="width:100%;height:100%;object-fit:cover;" alt="">
    </div>
    <span style="font-family:'Dosis',sans-serif;font-weight:600;font-size:8px;color:rgba(255,255,255,0.70);">{{WRITER_NAME}}</span>
  </div>
  </div>

</div>
</body>
</html>
