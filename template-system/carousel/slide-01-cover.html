<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:525px;overflow:hidden;">

  <img src="{{HERO_IMAGE}}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;" alt="">
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(14,12,8,0.98) 0%,rgba(14,12,8,0.65) 45%,transparent 100%);z-index:2;"></div>
  <img src="../assets/K.png" style="position:absolute;right:-40px;bottom:-20px;width:420px;height:auto;opacity:0.1;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:28px;filter:brightness(0) invert(1);" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:7px;letter-spacing:2.5px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;bottom:52px;left:22px;right:44px;z-index:10;">
  <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:2.5px;color:{{COLOR_ACCENT}};text-transform:uppercase;display:inline-block;margin-bottom:10px;">{{TONE}}</span>
    <h1 style="font-family:'TCM',sans-serif;font-weight:700;font-size:28px;color:#fff;line-height:1.15;margin:0 0 12px;">{{ART_TITLE}}</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:16px;height:1.5px;background:{{COLOR_ACCENT}};"></div>
    <span style="font-family:'Dosis',sans-serif;font-size:10px;color:rgba(255,255,255,0.45);">{{WRITER_NAME}}</span>
  </div>
  </div>
  <div style="position:absolute;right:0;top:0;bottom:0;width:44px;z-index:9;display:flex;align-items:center;justify-content:center;background:linear-gradient(to right,transparent,rgba(0,0,0,0.06));">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="{{COLOR_ACCENT}}99" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 28px 18px;z-index:10;display:flex;align-items:center;gap:10px;">
    <div style="flex:1;height:3px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;">
      <div style="height:100%;width:9%;background:#fff;border-radius:2px;"></div>
    </div>
    <span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:500;">1/11</span>
  </div>
</div>
</body>
</html>
