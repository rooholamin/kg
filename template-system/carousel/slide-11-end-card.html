<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:525px;overflow:hidden;">

  <div style="position:absolute;inset:0;background:#EEEAE0;"></div>
  <img src="../assets/K.png" style="position:absolute;right:-20px;bottom:-10px;width:380px;height:auto;opacity:0.05;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:28px;filter:none;" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:9px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 28px;z-index:10;">
    <div style="width:92px;height:92px;border-radius:50%;border:3px solid {{COLOR_ACCENT}};overflow:hidden;flex-shrink:0;margin-bottom:18px;">
      <img src="{{WRITER_PHOTO}}" style="width:100%;height:100%;object-fit:cover;" alt="">
    </div>
    <div style="font-family:'Dosis',sans-serif;font-weight:800;font-size:10px;color:{{COLOR_DARK}};letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;">{{SECTION_NAME}}</div>
    <div style="font-family:'TCM',sans-serif;font-weight:700;font-size:14px;color:#1A1810;margin-bottom:2px;text-align:center;">{{WRITER_NAME}}</div>
    <div style="width:40px;height:1.5px;background:linear-gradient(to right,{{COLOR_DARK}},{{COLOR_ACCENT}});border-radius:2px;margin-bottom:14px;margin-top:12px;"></div>
    <p style="font-family:'Dosis',sans-serif;font-size:12px;color:rgba(28,24,16,0.55);line-height:1.6;margin:0 0 14px;text-align:center;">{{END_CARD_BIO}}</p>
    <span style="font-family:'TCM',sans-serif;font-weight:700;font-size:11px;color:{{COLOR_DARK}};">insights.kghub.ca</span>
  </div>
  <div style="position:absolute;bottom:0;left:0;right:0;padding:14px 28px 18px;z-index:10;display:flex;align-items:center;gap:10px;">
    <div style="flex:1;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;">
      <div style="height:100%;width:{{SLIDE_PROGRESS}}%;background:#222;border-radius:2px;"></div>
    </div>
    <span style="font-size:11px;color:rgba(0,0,0,0.3);font-weight:500;">{{SLIDE_INDEX}}/{{SLIDE_TOTAL}}</span>
  </div>
</div>
</body>
</html>
