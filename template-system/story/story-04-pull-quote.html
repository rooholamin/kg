<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:747px;overflow:hidden;">
  <div style="position:absolute;inset:0;background:#222016;"></div>
  <div style="position:absolute;top:-50px;left:-10px;font-family:'TCM',sans-serif;font-size:420px;color:{{COLOR_ACCENT}}0f;line-height:1;z-index:1;">"</div>
  <img src="../assets/K.png" style="position:absolute;right:-50px;bottom:200px;width:460px;height:auto;opacity:0.11;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:30px;filter:brightness(0) invert(1);" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:90px 28px 130px;z-index:10;">
    <div style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;margin-bottom:18px;">PERSPECTIVE · {{SECTION_NAME_UPPER}}</div>
    <div style="width:24px;height:2px;background:linear-gradient(to right,{{COLOR_DARK}},{{COLOR_ACCENT}});border-radius:1px;margin-bottom:22px;"></div>
    <blockquote style="font-family:'TCM',sans-serif;font-weight:400;font-size:26px;color:#fff;line-height:1.45;margin:0 0 28px;font-style:italic;">&ldquo;{{QUOTE}}&rdquo;</blockquote>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="width:18px;height:1px;background:{{COLOR_ACCENT}};opacity:0.7;"></div>
      <span style="font-family:'Dosis',sans-serif;font-weight:600;font-size:9px;color:{{COLOR_ACCENT}};letter-spacing:1.5px;">{{WRITER_NAME_UPPER}}</span>
    </div>
  </div>


</div>
</body>
</html>
