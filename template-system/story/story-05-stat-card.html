<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:747px;overflow:hidden;">
  <div style="position:absolute;inset:0;background:#1C1910;"></div>
  <img src="../assets/K.png" style="position:absolute;right:-70px;bottom:-20px;width:540px;height:auto;opacity:0.18;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:30px;filter:brightness(0) invert(1);" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:90px 26px 130px;z-index:10;">
    <div style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;margin-bottom:18px;">BY THE NUMBERS</div>
    <div style="font-family:'TCM',sans-serif;font-weight:700;font-size:100px;line-height:0.9;letter-spacing:-3px;color:{{COLOR_ACCENT}};margin-bottom:16px;">{{STAT_N}}</div>
    <div style="width:40px;height:2px;background:linear-gradient(to right,{{COLOR_DARK}},{{COLOR_ACCENT}});border-radius:1px;margin-bottom:18px;"></div>
    <p style="font-family:'Dosis',sans-serif;font-size:16px;color:rgba(255,255,255,0.65);line-height:1.55;margin:0 0 10px;max-width:330px;">{{STAT_L}}</p>
    <p style="font-family:'Dosis',sans-serif;font-size:11px;color:rgba(255,255,255,0.28);line-height:1.5;margin:0;max-width:300px;">{{ART_TITLE}}</p>
  </div>


</div>
</body>
</html>
