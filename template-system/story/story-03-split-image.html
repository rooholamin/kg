<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:747px;overflow:hidden;">
  <div style="position:absolute;inset:0;background:#222016;"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:57%;overflow:hidden;">
    <img src="{{HERO_IMAGE}}" style="width:100%;height:100%;object-fit:cover;" alt="">
    <div style="position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,#222016,transparent);"></div>
  </div>
  <img src="../assets/K.png" style="position:absolute;right:-50px;bottom:250px;width:460px;height:auto;opacity:0.13;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:30px;filter:brightness(0) invert(1);" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;bottom:114px;left:22px;right:22px;z-index:10;">
    <div style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_ACCENT}};text-transform:uppercase;margin-bottom:12px;">{{LABEL}}</div>
    <h2 style="font-family:'TCM',sans-serif;font-weight:700;font-size:26px;color:#fff;line-height:1.2;margin:0 0 12px;">{{ART_TITLE}}</h2>
    <p style="font-family:'Dosis',sans-serif;font-size:13px;color:rgba(255,255,255,0.55);line-height:1.55;margin:0;">{{HOOK}}</p>
  </div>


</div>
</body>
</html>
