<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Bold.ttf') format('truetype');font-weight:700;}
@font-face{font-family:'TCM';src:url('../assets/fonts/TCM-Regular.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-Book.ttf') format('truetype');font-weight:400;}
@font-face{font-family:'Dosis';src:url('../assets/fonts/Dosis-SemiBold.ttf') format('truetype');font-weight:600 800;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;padding:0;margin:0;}
</style>
</head>
<body>
<div class="export" style="position:relative;width:420px;height:747px;overflow:hidden;">
  <div style="position:absolute;inset:0;background:#EEEAE0;"></div>
  <img src="../assets/K.png" style="position:absolute;right:-90px;bottom:-50px;width:500px;height:auto;opacity:0.05;pointer-events:none;z-index:1;" alt="">
  <div style="position:absolute;top:0;left:0;right:0;padding:22px 22px 0;display:flex;align-items:center;justify-content:space-between;z-index:20;">
    <img src="../assets/logo.svg" style="height:30px;filter:none;" alt="KG">
    <span style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;letter-spacing:3px;color:{{COLOR_DARK}};text-transform:uppercase;">{{SECTION_NAME}}</span>
  </div>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:90px 26px 130px;z-index:10;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
      <div style="width:52px;height:52px;border-radius:50%;border:2px solid {{COLOR_ACCENT}};overflow:hidden;flex-shrink:0;">
        <img src="{{WRITER_PHOTO}}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="">
      </div>
      <div>
        <div style="font-family:'TCM',sans-serif;font-weight:700;font-size:13px;color:#1A1810;">{{WRITER_NAME}}</div>
        <div style="font-family:'Dosis',sans-serif;font-weight:800;font-size:8px;color:{{COLOR_DARK}};letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;">{{SECTION_NAME}}</div>
      </div>
    </div>
    <div style="width:32px;height:2px;background:linear-gradient(to right,{{COLOR_DARK}},{{COLOR_ACCENT}});border-radius:1px;margin-bottom:22px;"></div>
    <h2 style="font-family:'TCM',sans-serif;font-weight:700;font-size:28px;color:#1A1810;line-height:1.18;margin:0 0 16px;">{{ART_TITLE}}</h2>
    <p style="font-family:'Dosis',sans-serif;font-size:14px;color:rgba(28,24,16,0.55);line-height:1.6;margin:0;">{{HOOK}}</p>
  </div>


</div>
</body>
</html>
