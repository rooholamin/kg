<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KGHub.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c8a96e;
      --gold-light: #dfc99a;
      --magenta: #d4145a;
      --bg: #09090a;
      --text: #ede9e1;
      --muted: #8c877f;
      --border: rgba(200,169,110,0.15);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-gold {
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,0.09) 0%, transparent 65%);
      top: -260px; right: -160px;
      pointer-events: none; z-index: 0;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .glow-magenta {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,20,90,0.07) 0%, transparent 65%);
      bottom: -180px; left: -120px;
      pointer-events: none; z-index: 0;
      animation: drift 26s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(50px, 35px); }
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .mark {
      width: 52px; height: 52px;
      margin-bottom: 48px;
    }

    .wordmark {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
      font-size: clamp(56px, 11vw, 108px);
      letter-spacing: 0.22em;
      line-height: 1;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-right: 0.22em;
    }
    .wordmark .dot { color: var(--gold); font-weight: 200; }

    .domain-label {
      font-weight: 200;
      font-size: clamp(10px, 1.3vw, 12px);
      letter-spacing: 0.6em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 56px;
      padding-right: 0.6em;
    }

    .vline {
      width: 1px; height: 64px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 0 auto 52px;
    }

    .headline {
      font-weight: 200;
      font-size: clamp(18px, 3vw, 30px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 18px;
      padding-right: 0.28em;
    }

    .sub {
      font-weight: 100;
      font-size: clamp(12px, 1.4vw, 13.5px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 72px;
      padding-right: 0.18em;
    }

    .rule {
      width: min(440px, 80%);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin-bottom: 44px;
    }

    .attribution {
      display: flex;
      align-items: center;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .attr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .attr-label {
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      padding-right: 0.32em;
    }

    .logo-kingsgate {
      height: 26px;
      width: auto;
      object-fit: contain;
      opacity: 0.85;
      transition: opacity 0.25s;
    }
    .logo-brandata {
      height: 29px;
      width: auto;
      object-fit: contain;
      opacity: 0.82;
      transition: opacity 0.25s;
    }
    .logo-kingsgate:hover,
    .logo-brandata:hover { opacity: 1; }

    .attr-sep {
      width: 1px; height: 48px;
      background: var(--border);
      flex-shrink: 0;
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards;
    }
    .d1 { animation-delay: 0.08s; }
    .d2 { animation-delay: 0.22s; }
    .d3 { animation-delay: 0.38s; }
    .d4 { animation-delay: 0.54s; }
    .d5 { animation-delay: 0.70s; }
    .d6 { animation-delay: 0.86s; }
    .d7 { animation-delay: 1.00s; }
    .d8 { animation-delay: 1.10s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .attr-sep { display: none; }
      .attribution { gap: 32px; }
    }
  </style>
</head>
